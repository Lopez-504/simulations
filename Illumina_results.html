<h1 id="intro">Intro</h1>
<ul>
<li>In light pollution analysis and skyglow modeling (such as with the Illumina radiative transfer model), we're tracking how <strong>artificial light from cities escapes into the atmosphere</strong>, <strong>interacts with particles</strong>, and is <strong>directed back down toward an observer</strong> or an astronomical observatory</li>
<li><strong>Objetivo</strong>: Estudiar cuales son los parámetros que podemos modificar en Illumina para generar distintas simulaciones</li>
<li>Referencias principales: Aube &amp; Kocifaj (2005, 2012, 2015, 2018, 2020), informe ESO 2025, Hess 1998.</li>
<li>Illumina trabaja únicamente con fuentes <strong>luz artificial</strong></li>
<li><a href="https://lopez-504.github.io/simulations/">Website</a></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3">
<h1 id="diffuse-radiance-vs-skyglow">Diffuse radiance vs. Skyglow</h1>
<ol>
<li><em>Diffuse Sky Radiation</em>:
<ul>
<li>Source: It is the <strong>natural scattering of direct sunlight by atmospheric molecules, aerosols, and water droplets</strong>.</li>
<li>Energy Scale: Usually referred to as Diffuse Horizontal Irradiance (DHI) and measured in W/m². Utilized in solar panel and climate modeling.</li>
</ul>
</li>
<li><em>Skyglow</em> (Sky Glow):
<ul>
<li>Source: The <strong>diffuse, artificial luminance of the night sky caused by the scattering of anthropogenic (human-made) light—such as streetlights and commercial signs—in the atmosphere</strong>. It can be amplified when artificial light reflects off and scatters through cloud covers.</li>
<li>Energy Scale: Typically measured using units of radiance or luminance (e.g., W/m²/sr/nm) because it deals with <strong>dark-sky brightness</strong> rather than solar-level power.</li>
</ul>
</li>
</ol>
</section>

<ol start="3">
<li><strong>Illumina outputs</strong>: contribution maps (skyglow <code>W/m^2/sr/nm</code>). Generar gráficas a partir de estas salidas (<code>results_interp.py</code>)</li>
<li><strong>Analyzing the results</strong>:
<ul>
<li>Comparar gráficas interpoladas. Un <strong>problema</strong> que aún debe solucionarse es que no todas las interpolaciones admiten los mismos valores de radiancia difusa para los isocontornos, ya que se generan artefactos en las gráficas</li>
<li>Nota 1: los códigos que ofrece Illumina para realizar el análisis no funcionan correctamente en kosmos y tampoco de manera local</li>
<li>Nota 2: La conversión de radiación difusa (artificial) a sky brightness aún no se considera por falta de datos experimentales <em>in situ</em></li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21">

</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23">
<h1 id="illumina-outputs">Illumina <strong>Outputs</strong></h1>
<p><em>Note</em>:</p>
<ul>
<li><strong>Irradiance</strong>: amount of <strong>radiant power</strong> arriving at a surface.
<ul>
<li><em>How much light reaches me?</em></li>
<li>~ Received energy (W m⁻² nm⁻¹)</li>
</ul>
</li>
<li><strong>Radiance</strong>: apparent brightness in a <strong>particular direction</strong> (what a camera or the human eye would see). Depends on detector area, incoming angle and viewing direction.
<ul>
<li><em>How bright is the scene in THIS direction?</em></li>
<li>~ Brightness (W sr⁻¹ m⁻² nm⁻¹)</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24">
<ul>
<li>
<p>Illumina's design cleanly separates:</p>
<ol>
<li><strong>Geometric optics</strong>: the direct and reflected components, where photons follow well-defined paths.</li>
<li><strong>Radiative transfer</strong>: the diffuse and cloud components, where photons are redistributed by scattering.</li>
</ol>
</li>
<li>
<p>This separation makes it easier to <strong>diagnose why</strong> a simulated night sky is bright: one can immediately tell whether the brightness comes from directly visible sources, illuminated surfaces, clouds, or the atmosphere itself.</p>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25">
<h2 id="radiometric-values"><strong>Radiometric</strong> values:</h2>
<ol>
<li><code>Direct irradiance from sources</code>: Light arriving directly from the original emitters.
<ul>
<li>Lamp <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Observer</li>
<li>The atmosphere only attenuates the beam (<strong>absorption/extinction</strong>), but the photons never change direction (i.e., no scattering)</li>
</ul>
</li>
<li><code>Direct irradiance from reflection</code>: the irradiance produced by <strong>reflected light</strong> from terrain.
<ul>
<li>Lamp <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Ground <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Observer</li>
<li>No scattering inside the atmosphere. The ground acts like a secondary source.</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26">
<ol start="3">
<li><code>Direct radiance from sources</code>: If a lamp is inside the observer field of view, then its apparent brightness is direct radiance
<ul>
<li>Observer <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.64ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1609 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F5" d="M165 270H1510Q1525 262 1525 250T1510 230H165Q167 228 182 216T211 189T244 152T277 96T303 25Q308 7 308 0Q308 -11 288 -11Q281 -11 278 -11T272 -7T267 2T263 21Q245 94 195 151T73 236Q58 242 55 247Q55 254 59 257T73 264Q121 283 158 314T215 375T247 434T264 480L267 497Q269 503 270 505T275 509T288 511Q308 511 308 500Q308 493 303 475Q293 438 278 406T246 352T215 315T185 287T165 270Z"></path></g></g></g></svg></mjx-container> Lamp</li>
<li>Direct line of sight, no scattering, no reflection</li>
</ul>
</li>
<li><code>Direct radiance from reflection</code>: brightness produced by illuminated terrain.
<ul>
<li>Observer <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Ground  Lamp</li>
<li>Again, no scattering.</li>
<li>This is exactly what happens when we see a brightly illuminated parking lot at night. We're mostly seeing reflected light rather than the lamp itself.</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27">
<ol start="5">
<li><code>Cloud radiance</code>: brightness generated by scattering inside clouds, photons that scatter <strong>inside clouds</strong>
<ul>
<li>Lamp <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Cloud <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Observer</li>
</ul>
</li>
<li><code>Diffuse radiance</code>: <strong>all scattered light arriving from the atmosphere</strong>, including clouds.
<ul>
<li>Lamp <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Atmosphere + Clouds <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="3.706ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1638 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="27F6" d="M84 237T84 250T98 270H1444Q1328 357 1301 493Q1301 494 1301 496T1300 499Q1300 511 1317 511H1320Q1329 511 1332 510T1338 506T1341 497T1344 481T1352 456Q1374 389 1425 336T1544 261Q1553 258 1553 250Q1553 244 1548 241T1524 231T1486 212Q1445 186 1415 152T1370 85T1349 35T1341 4Q1339 -6 1336 -8T1320 -11Q1300 -11 1300 0Q1300 7 1305 25Q1337 151 1444 230H98Q84 237 84 250Z"></path></g></g></g></svg></mjx-container> Observer</li>
<li>Diffuse radiance =  Atmospheric diffuse + Cloud diffuse</li>
<li>To isolate only the atmospheric contribution just substract cloud radiance from diffuse radiance.</li>
</ul>
</li>
</ol>
